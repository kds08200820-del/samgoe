<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 | 삼괴지역 기독교 연합회</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root{--primary:#1c69d4;--primary-active:#0653b6;--ink:#262626;--bodytext:#3c3c3c;--muted:#6b6b6b;
      --hairline:#e6e6e6;--hairline-strong:#cccccc;--canvas:#fff;--surface-soft:#f7f7f7;--dark:#1a2129;--error:#dc2626;--ok:#0f7b3f;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--surface-soft);color:var(--bodytext);font-weight:300;
      font-family:'Pretendard Variable',Pretendard,system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      -webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .bar{position:sticky;top:0;background:var(--dark);height:44px;display:flex;align-items:center;z-index:20;}
    .bar .in{max-width:1024px;margin:0 auto;width:100%;padding:0 22px;display:flex;align-items:center;justify-content:space-between;}
    .bar .in > a{font-size:13px;font-weight:700;color:rgba(255,255,255,0.92);}
    #authArea{font-size:12px;}
    .wrap{max-width:470px;margin:0 auto;padding:48px 24px 80px;}
    .card{background:var(--canvas);border:1px solid var(--hairline);padding:40px 34px;}
    .logo{height:40px;width:auto;display:block;margin:0 auto 20px;}
    .title{margin:0;font-weight:700;font-size:28px;letter-spacing:0;color:var(--ink);text-align:center;}
    .sub{margin:8px 0 26px;font-size:15px;color:var(--muted);text-align:center;line-height:1.5;}
    label{display:block;font-size:13px;font-weight:700;letter-spacing:0.3px;color:var(--ink);margin:16px 0 6px;}
    input{width:100%;height:48px;padding:0 14px;border:1px solid var(--hairline-strong);background:#fff;
      font-size:16px;font-family:inherit;font-weight:300;color:var(--ink);border-radius:0;}
    input:focus{outline:none;border:2px solid var(--ink);}
    .hint{margin:6px 0 0;font-size:12px;color:var(--muted);}
    .acWrap{position:relative;}
    .ac-list{position:absolute;left:0;right:0;top:100%;z-index:10;background:#fff;border:1px solid var(--hairline-strong);
      border-top:0;max-height:230px;overflow-y:auto;display:none;}
    .ac-item{padding:11px 14px;font-size:14px;cursor:pointer;border-top:1px solid var(--hairline);}
    .ac-item:first-child{border-top:0;}
    .ac-item:hover,.ac-item.active{background:var(--surface-soft);}
    .ac-item b{color:var(--ink);font-weight:700;}
    .ac-item span{color:var(--muted);font-size:12px;margin-left:6px;}
    .memberTag{display:none;margin-top:8px;font-size:13px;font-weight:700;padding:8px 12px;}
    .memberTag.full{display:block;background:#eaf3ff;border:1px solid #b9d6ff;color:var(--primary);}
    .memberTag.general{display:block;background:var(--surface-soft);border:1px solid var(--hairline-strong);color:var(--muted);}
    .kinds{display:flex;gap:8px;margin-top:6px;}
    .kind{flex:1;position:relative;}
    .kind input{position:absolute;opacity:0;width:0;height:0;}
    .kind span{display:block;text-align:center;padding:12px 6px;border:1px solid var(--hairline-strong);background:#fff;
      font-size:14px;font-weight:400;color:var(--bodytext);cursor:pointer;line-height:1.35;}
    .kind span small{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
    .kind input:checked + span{border:2px solid var(--ink);color:var(--ink);font-weight:700;background:#f4f8ff;}
    .btn{width:100%;height:48px;border:0;border-radius:0;background:var(--primary);color:#fff;font-size:15px;
      font-weight:700;letter-spacing:0.5px;cursor:pointer;margin-top:26px;font-family:inherit;transition:background .15s ease;}
    .btn:hover{background:var(--primary-active);}
    .btn:disabled{background:var(--hairline-strong);cursor:default;}
    .agree{margin-top:24px;border:1px solid var(--hairline-strong);background:var(--surface-soft);padding:14px 16px;}
    .chk{display:flex;align-items:flex-start;gap:9px;margin:0;font-size:14px;font-weight:400;color:var(--bodytext);cursor:pointer;letter-spacing:0;}
    .chk input{width:18px;height:18px;flex:0 0 18px;margin:1px 0 0;accent-color:var(--primary);cursor:pointer;}
    .chk.all{font-weight:700;color:var(--ink);padding-bottom:12px;margin-bottom:10px;border-bottom:1px solid var(--hairline-strong);}
    .chk.item{margin-top:9px;}
    .chk a{color:var(--primary);font-weight:700;text-decoration:underline;}
    .err{display:none;margin-top:18px;padding:12px 14px;background:#fdecea;border:1px solid #f3c7c3;color:var(--error);font-size:14px;line-height:1.5;}
    .foot{text-align:center;margin-top:24px;font-size:14px;color:var(--muted);}
    .foot a{color:var(--primary);font-weight:700;}
    .home{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
  </style>
</head>
<body>
  <header class="bar"><div class="in"><a href="index.html">삼괴지역 기독교 연합회</a><span id="authArea"></span></div></header>
  <div class="wrap">
    <div class="card" id="card">
      <img class="logo" src="assets/logo-trans.png" alt="삼기연" />
      <h1 class="title">회원가입</h1>
      <p class="sub">삼기연 홈페이지 회원 정보를 입력해 주세요.</p>
      <form id="signupForm" novalidate>
        <label for="name">이름</label>
        <input id="name" type="text" required placeholder="홍길동" autocomplete="name" />

        <label for="church">교회명 <span style="font-weight:400;color:var(--muted)">(검색)</span></label>
        <div class="acWrap">
          <input id="church" type="text" required placeholder="교회 이름을 입력하면 검색됩니다" autocomplete="off" />
          <div class="ac-list" id="churchList"></div>
        </div>

        <label>가입 구분</label>
        <div class="kinds">
          <label class="kind"><input type="radio" name="kind" value="담임목사" checked /><span>담임목사<small>본인이 담임목사</small></span></label>
          <label class="kind"><input type="radio" name="kind" value="사모" /><span>사모<small>목사님의 아내</small></span></label>
          <label class="kind"><input type="radio" name="kind" value="사부" /><span>사부<small>목사님의 남편</small></span></label>
        </div>
        <div class="memberTag" id="memberTag"></div>

        <label for="phone">전화번호</label>
        <input id="phone" type="tel" required placeholder="010-0000-0000" autocomplete="tel" />

        <label for="address">주소</label>
        <input id="address" type="text" required placeholder="예) 화성시 우정읍 ○○로 00" autocomplete="street-address" />

        <label for="email">이메일</label>
        <input id="email" type="email" required autocomplete="email" placeholder="you@example.com" />

        <label for="pw">비밀번호</label>
        <input id="pw" type="password" required autocomplete="new-password" placeholder="비밀번호 (8자 이상, 영문+숫자 포함)" />

        <label for="pw2">비밀번호 확인</label>
        <input id="pw2" type="password" required autocomplete="new-password" placeholder="비밀번호를 한 번 더 입력" />

        <div class="agree">
          <label class="chk all"><input type="checkbox" id="agreeAll" /> 약관에 모두 동의합니다.</label>
          <label class="chk item"><input type="checkbox" id="agreeTerms" /> <span><a href="terms.html#terms" target="_blank" rel="noopener">이용약관</a>에 동의합니다. <b style="color:var(--primary)">(필수)</b></span></label>
          <label class="chk item"><input type="checkbox" id="agreePrivacy" /> <span><a href="terms.html#privacy" target="_blank" rel="noopener">개인정보 수집·이용</a>에 동의합니다. <b style="color:var(--primary)">(필수)</b></span></label>
        </div>

        <div class="err" id="err"></div>
        <button class="btn" type="submit">회원가입</button>
      </form>
      <div class="foot">이미 계정이 있으신가요? <a href="login.html">로그인</a></div>
    </div>
    <a class="home" href="index.html">← 홈으로 돌아가기</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=2"></script>
  <script src="churches.js?v=2"></script>
  <script src="auth.js?v=11"></script>
  <script>
    var err = document.getElementById('err');
    function showErr(m){ err.textContent = m; err.style.display = 'block'; }
    function norm(s){ return String(s || '').replace(/\s+/g, '').replace(/목사$/, ''); }

    // ---- 교회명 검색 자동완성 ----
    var churchInput = document.getElementById('church');
    var churchList = document.getElementById('churchList');
    var memberTag = document.getElementById('memberTag');
    var CH = window.CHURCHES || [];

    function getKind(){
      var r = document.querySelector('input[name="kind"]:checked');
      return r ? r.value : '담임목사';
    }
    function updateMemberTag(){
      var kind = getKind();
      var nm = norm(document.getElementById('name').value);
      var rec = CH.find(function(c){ return c.name === churchInput.value.trim(); });
      memberTag.className = 'memberTag';
      if(!churchInput.value.trim()){ memberTag.textContent=''; return; }
      if(kind === '사모' || kind === '사부'){
        var who = kind === '사모' ? '사모님' : '사부님';
        memberTag.textContent = '담임목사님이 먼저 정회원으로 가입돼 있고 주소가 같으면 ' + who + '도 정회원으로 가입됩니다. (가입 후 자동 확인)';
        memberTag.classList.add('full');
        return;
      }
      if(!nm){ memberTag.textContent=''; return; }
      if(rec && norm(rec.pastor) === nm){
        memberTag.textContent = '✓ 회원교회 담임목사로 확인됩니다 — 정회원으로 가입됩니다.';
        memberTag.classList.add('full');
      } else {
        memberTag.textContent = '일반회원으로 가입됩니다. (회원교회 담임목사 명단과 일치 시 정회원)';
        memberTag.classList.add('general');
      }
    }
    Array.prototype.forEach.call(document.querySelectorAll('input[name="kind"]'), function(r){
      r.addEventListener('change', updateMemberTag);
    });
    function renderList(q){
      q = q.trim();
      churchList.innerHTML = '';
      if(!q){ churchList.style.display='none'; return; }
      var matches = CH.filter(function(c){ return c.name.indexOf(q) >= 0; }).slice(0, 8);
      if(!matches.length){ churchList.style.display='none'; return; }
      matches.forEach(function(c){
        var d = document.createElement('div');
        d.className = 'ac-item';
        d.innerHTML = '<b>'+c.name+'</b><span>'+c.region+' · '+c.pastor+' 목사</span>';
        d.addEventListener('mousedown', function(e){
          e.preventDefault();
          churchInput.value = c.name;
          churchList.style.display='none';
          updateMemberTag();
        });
        churchList.appendChild(d);
      });
      churchList.style.display='block';
    }
    churchInput.addEventListener('input', function(){ renderList(churchInput.value); updateMemberTag(); });
    churchInput.addEventListener('focus', function(){ renderList(churchInput.value); });
    churchInput.addEventListener('blur', function(){ setTimeout(function(){ churchList.style.display='none'; }, 150); });
    document.getElementById('name').addEventListener('input', updateMemberTag);

    // ---- 약관 동의 체크박스 ----
    var agreeAll = document.getElementById('agreeAll');
    var agreeTerms = document.getElementById('agreeTerms');
    var agreePrivacy = document.getElementById('agreePrivacy');
    agreeAll.addEventListener('change', function(){
      agreeTerms.checked = agreeAll.checked;
      agreePrivacy.checked = agreeAll.checked;
    });
    function syncAll(){ agreeAll.checked = agreeTerms.checked && agreePrivacy.checked; }
    agreeTerms.addEventListener('change', syncAll);
    agreePrivacy.addEventListener('change', syncAll);

    // ---- 회원가입 제출 ----
    var f = document.getElementById('signupForm');
    f.addEventListener('submit', async function (e) {
      e.preventDefault(); err.style.display='none';
      var name = document.getElementById('name').value.trim();
      var church = churchInput.value.trim();
      var phone = document.getElementById('phone').value.trim();
      var address = document.getElementById('address').value.trim();
      var email = document.getElementById('email').value.trim();
      var pw = document.getElementById('pw').value;
      var pw2 = document.getElementById('pw2').value;

      if(!name || !church || !phone || !address || !email){ showErr('모든 항목을 입력해 주세요.'); return; }
      if(pw.length < 8 || !/[A-Za-z]/.test(pw) || !/[0-9]/.test(pw)){ showErr('비밀번호는 8자 이상이며 영문과 숫자를 모두 포함해야 합니다.'); return; }
      if(pw !== pw2){ showErr('비밀번호가 일치하지 않습니다.'); return; }
      if(!agreeTerms.checked || !agreePrivacy.checked){ showErr('이용약관과 개인정보 수집·이용에 동의해 주세요.'); return; }
      if(!window.sb){ showErr('로그인 설정이 아직 완료되지 않았습니다. (관리자: Supabase 설정 필요)'); return; }

      var kind = getKind();
      var btn = f.querySelector('.btn'); btn.disabled = true; btn.textContent = '가입 중...';

      // 정회원 판별
      var memberType;
      if(kind === '사모' || kind === '사부'){
        // 담임목사님이 먼저 정회원으로 가입돼 있고 주소가 같아야 정회원
        try {
          var chk = await window.sb.rpc('spouse_member_check', { p_church: church, p_address: address });
          memberType = (!chk.error && chk.data === true) ? '정회원' : '일반회원';
        } catch(_) { memberType = '일반회원'; }
      } else {
        var rec = CH.find(function(c){ return c.name === church; });
        memberType = (rec && norm(rec.pastor) === norm(name)) ? '정회원' : '일반회원';
      }

      try {
        var res = await window.sb.auth.signUp({
          email: email, password: pw,
          options: {
            data: { name: name, address: address, phone: phone, church: church, member_type: memberType, member_kind: kind }
          }
        });
        if(res.error){ showErr(window.krErr(res.error.message)); btn.disabled=false; btn.textContent='회원가입'; return; }
        // 이메일 인증 없이 바로 로그인 세션이 생성되면 홈으로 이동
        if(res.data && res.data.session){ location.href = 'index.html'; return; }
        // 세션이 없으면(=자동 로그인 실패) 방금 만든 계정으로 로그인 시도
        try {
          var lin = await window.sb.auth.signInWithPassword({ email: email, password: pw });
          if(lin.data && lin.data.session){ location.href = 'index.html'; return; }
        } catch(_) {}
        var kindNote = (kind === '사모' || kind === '사부')
          ? '<p class="sub" style="font-size:13px">가입 구분: <b>'+kind+' · '+memberType+'</b>' +
            (memberType === '일반회원' ? '<br><span style="color:var(--muted)">담임목사님이 정회원으로 가입돼 있고 주소가 같으면 정회원으로 처리됩니다.</span>' : '') + '</p>'
          : '<p class="sub" style="font-size:13px">가입 구분: <b>'+memberType+'</b></p>';
        document.getElementById('card').innerHTML =
          '<h1 class="title">가입 완료</h1>' +
          '<p class="sub">회원가입이 완료되었습니다.<br>이제 로그인해 이용하실 수 있습니다.</p>' +
          kindNote +
          '<a class="btn" style="display:flex;align-items:center;justify-content:center;text-decoration:none" href="login.html">로그인하러 가기</a>';
      } catch(ex){ showErr(window.krErr(ex && ex.message)); btn.disabled=false; btn.textContent='회원가입'; }
    });
  </script>
  <footer style="background:#1a2129;color:rgba(255,255,255,0.7);padding:24px;text-align:center;font-size:13px;">
    © 2026 삼괴지역 기독교 연합회 &nbsp;·&nbsp;
    <a href="terms.html#terms" style="color:rgba(255,255,255,0.9);font-weight:700;">이용약관</a> &nbsp;·&nbsp;
    <a href="terms.html#privacy" style="color:rgba(255,255,255,0.9);font-weight:700;">개인정보처리방침</a>
  </footer>
</body>
</html>

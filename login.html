<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 | 삼괴지역 기독교 연합회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#1c69d4;--primary-active:#0653b6;--ink:#262626;--bodytext:#3c3c3c;--muted:#6b6b6b;
      --hairline:#e6e6e6;--hairline-strong:#cccccc;--canvas:#fff;--surface-soft:#f7f7f7;--dark:#1a2129;--error:#dc2626;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--surface-soft);color:var(--bodytext);font-weight:300;
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      -webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .bar{position:sticky;top:0;background:var(--dark);height:44px;display:flex;align-items:center;}
    .bar .in{max-width:1024px;margin:0 auto;width:100%;padding:0 22px;display:flex;align-items:center;justify-content:space-between;}
    .bar .in > a{font-size:13px;font-weight:700;color:rgba(255,255,255,0.92);}
    #authArea{font-size:12px;}
    .wrap{max-width:430px;margin:0 auto;padding:56px 24px 80px;}
    .card{background:var(--canvas);border:1px solid var(--hairline);padding:44px 34px;}
    .logo{height:42px;width:auto;display:block;margin:0 auto 22px;}
    .title{margin:0;font-weight:700;font-size:28px;letter-spacing:0;color:var(--ink);text-align:center;}
    .sub{margin:8px 0 30px;font-size:15px;color:var(--muted);text-align:center;}
    label{display:block;font-size:13px;font-weight:700;letter-spacing:0.3px;color:var(--ink);margin:18px 0 6px;}
    input{width:100%;height:48px;padding:0 14px;border:1px solid var(--hairline-strong);background:#fff;
      font-size:16px;font-family:inherit;font-weight:300;color:var(--ink);border-radius:0;}
    input:focus{outline:none;border:2px solid var(--ink);}
    .btn{width:100%;height:48px;border:0;border-radius:0;background:var(--primary);color:#fff;font-size:15px;
      font-weight:700;letter-spacing:0.5px;cursor:pointer;margin-top:26px;font-family:inherit;transition:background .15s ease;}
    .btn:hover{background:var(--primary-active);}
    .btn:disabled{background:var(--hairline-strong);cursor:default;}
    .kakao{width:100%;height:48px;border:0;border-radius:0;background:#FEE500;color:#191600;font-size:15px;
      font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit;}
    .divider{display:flex;align-items:center;gap:12px;margin:26px 0 2px;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--hairline);}
    .err{display:none;margin-top:18px;padding:12px 14px;background:#fdecea;border:1px solid #f3c7c3;color:var(--error);font-size:14px;line-height:1.5;}
    .foot{text-align:center;margin-top:24px;font-size:14px;color:var(--muted);}
    .foot a{color:var(--primary);font-weight:700;}
    .home{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
  </style>
</head>
<body>
  <header class="bar"><div class="in"><a href="index.html">삼괴지역 기독교 연합회</a><span id="authArea"></span></div></header>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="assets/logo-trans.png" alt="삼기연" />
      <h1 class="title">로그인</h1>
      <p class="sub">삼기연 회원 로그인</p>
      <form id="loginForm" novalidate>
        <label for="email">이메일</label>
        <input id="email" type="email" required autocomplete="email" placeholder="you@example.com" />
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" required autocomplete="current-password" placeholder="비밀번호" />
        <div class="err" id="err"></div>
        <button class="btn" type="submit">로그인</button>
      </form>
      <div class="divider">또는</div>
      <button class="kakao" id="kakaoBtn" type="button">카카오로 로그인</button>
      <div class="foot">계정이 없으신가요? <a href="signup.html">회원가입</a></div>
    </div>
    <a class="home" href="index.html">← 홈으로 돌아가기</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=2"></script>
  <script src="auth.js?v=2"></script>
  <script>
    var f = document.getElementById('loginForm');
    var err = document.getElementById('err');
    function showErr(m){ err.textContent = m; err.style.display = 'block'; }
    f.addEventListener('submit', async function (e) {
      e.preventDefault(); err.style.display = 'none';
      if (!window.sb) { showErr('로그인 설정이 아직 완료되지 않았습니다. (관리자: Supabase Anon Key 입력 필요)'); return; }
      var btn = f.querySelector('.btn'); btn.disabled = true; btn.textContent = '로그인 중...';
      try {
        var res = await window.sb.auth.signInWithPassword({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('pw').value
        });
        if (res.error) { showErr(window.krErr(res.error.message)); }
        else { location.href = 'index.html'; return; }
      } catch (ex) { showErr(window.krErr(ex && ex.message)); }
      btn.disabled = false; btn.textContent = '로그인';
    });
    document.getElementById('kakaoBtn').addEventListener('click', async function () {
      err.style.display = 'none';
      if (!window.sb) { showErr('로그인 설정이 아직 완료되지 않았습니다.'); return; }
      try {
        var res = await window.sb.auth.signInWithOAuth({ provider: 'kakao', options: { redirectTo: location.origin } });
        if (res.error) showErr('카카오 로그인은 준비 중입니다. (Supabase에서 Kakao provider 설정이 필요합니다.)');
      } catch (ex) { showErr('카카오 로그인은 준비 중입니다. (Supabase에서 Kakao provider 설정이 필요합니다.)'); }
    });
  </script>
</body>
</html>

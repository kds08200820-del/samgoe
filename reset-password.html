<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 재설정 | 삼괴지역 기독교 연합회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    :root{--primary:#1c69d4;--primary-active:#0653b6;--ink:#262626;--bodytext:#3c3c3c;--muted:#6b6b6b;
      --hairline:#e6e6e6;--hairline-strong:#cccccc;--canvas:#fff;--surface-soft:#f7f7f7;--dark:#1a2129;--error:#dc2626;--ok:#177245;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--surface-soft);color:var(--bodytext);font-weight:300;
      font-family:"Pretendard Variable",Pretendard,'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .bar{position:sticky;top:0;background:var(--dark);height:44px;display:flex;align-items:center;}
    .bar .in{max-width:1024px;margin:0 auto;width:100%;padding:0 22px;display:flex;align-items:center;}
    .bar .in > a{font-size:13px;font-weight:700;color:rgba(255,255,255,0.92);}
    .wrap{max-width:430px;margin:0 auto;padding:56px 24px 80px;}
    .card{background:var(--canvas);border:1px solid var(--hairline);padding:44px 34px;}
    .logo{height:42px;width:auto;display:block;margin:0 auto 22px;}
    .title{margin:0;font-weight:700;font-size:26px;letter-spacing:0;color:var(--ink);text-align:center;}
    .sub{margin:8px 0 26px;font-size:15px;color:var(--muted);text-align:center;line-height:1.6;}
    label{display:block;font-size:13px;font-weight:700;letter-spacing:0.3px;color:var(--ink);margin:18px 0 6px;}
    input{width:100%;height:48px;padding:0 14px;border:1px solid var(--hairline-strong);background:#fff;
      font-size:16px;font-family:inherit;font-weight:300;color:var(--ink);border-radius:0;}
    input:focus{outline:none;border:2px solid var(--ink);}
    .btn{width:100%;height:48px;border:0;border-radius:0;background:var(--primary);color:#fff;font-size:15px;
      font-weight:700;letter-spacing:0.5px;cursor:pointer;margin-top:26px;font-family:inherit;transition:background .15s ease;}
    .btn:hover{background:var(--primary-active);} .btn:disabled{background:var(--hairline-strong);cursor:default;}
    .msg{margin-top:18px;padding:12px 14px;font-size:14px;line-height:1.5;display:none;}
    .msg.err{background:#fdecea;border:1px solid #f3c7c3;color:var(--error);}
    .msg.ok{background:#eaf6ee;border:1px solid #bfe3cb;color:var(--ok);}
    .home{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
    .home a{color:var(--primary);font-weight:700;}
  </style>
</head>
<body>
  <header class="bar"><div class="in"><a href="index.html">삼괴지역 기독교 연합회</a></div></header>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="assets/logo-trans.png?v=2" alt="삼기연" />
      <h1 class="title">비밀번호 재설정</h1>

      <!-- 로딩 -->
      <div id="loadingState">
        <p class="sub">재설정 링크를 확인하고 있습니다…</p>
      </div>

      <!-- 새 비밀번호 입력 -->
      <div id="formState" style="display:none;">
        <p class="sub">새로 사용하실 비밀번호를 입력해 주세요.</p>
        <label for="pw1">새 비밀번호</label>
        <input id="pw1" type="password" autocomplete="new-password" placeholder="6자 이상" />
        <label for="pw2">새 비밀번호 확인</label>
        <input id="pw2" type="password" autocomplete="new-password" placeholder="한 번 더 입력" />
        <div class="msg err" id="fErr"></div>
        <button class="btn" id="saveBtn" type="button">비밀번호 변경</button>
      </div>

      <!-- 유효하지 않은 링크 -->
      <div id="invalidState" style="display:none;">
        <p class="sub">유효하지 않거나 만료된 링크입니다.<br>로그인 화면에서 <b>비밀번호 찾기</b>를 다시 진행해 주세요.</p>
        <a class="btn" href="login.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">로그인으로 가기</a>
      </div>

      <!-- 완료 -->
      <div id="doneState" style="display:none;">
        <div class="msg ok" style="display:block;">비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요.</div>
        <a class="btn" href="login.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">로그인하러 가기</a>
      </div>
    </div>
    <a class="home" href="login.html">← 로그인으로 돌아가기</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=2"></script>
  <script src="auth.js?v=6"></script>
  <script>
  (function(){
    function show(id){ ['loadingState','formState','invalidState','doneState'].forEach(function(s){ document.getElementById(s).style.display = (s===id?'block':'none'); }); }
    function showErr(m){ var e=document.getElementById('fErr'); e.textContent=m; e.style.display='block'; }

    var recovered = false;
    function onRecovery(){ if(recovered) return; recovered = true; show('formState'); }

    if(!window.sb){ show('invalidState'); return; }

    // 복구 세션 감지: 이메일 링크(#access_token&type=recovery)로 들어오면 PASSWORD_RECOVERY 이벤트 발생
    window.sb.auth.onAuthStateChange(function(event, session){
      if(event === 'PASSWORD_RECOVERY') onRecovery();
    });

    // 이벤트가 리스너 등록 전에 발생했을 수도 있어 세션도 함께 확인
    (async function(){
      try{
        var s = await window.sb.auth.getSession();
        if(s && s.data && s.data.session){ onRecovery(); return; }
      }catch(_){}
      // detectSessionInUrl 처리 시간을 잠시 준 뒤 재확인
      setTimeout(async function(){
        if(recovered) return;
        try{ var s2 = await window.sb.auth.getSession(); if(s2 && s2.data && s2.data.session){ onRecovery(); return; } }catch(_){}
        show('invalidState');
      }, 1200);
    })();

    document.getElementById('saveBtn').addEventListener('click', async function(){
      var p1=document.getElementById('pw1').value, p2=document.getElementById('pw2').value;
      document.getElementById('fErr').style.display='none';
      if(p1.length < 6){ showErr('비밀번호는 6자 이상이어야 합니다.'); return; }
      if(p1 !== p2){ showErr('비밀번호가 일치하지 않습니다.'); return; }
      var btn=this; btn.disabled=true; btn.textContent='변경 중…';
      try{
        var res = await window.sb.auth.updateUser({ password: p1 });
        if(res.error){ btn.disabled=false; btn.textContent='비밀번호 변경'; showErr(window.krErr ? window.krErr(res.error.message) : res.error.message); return; }
        try{ await window.sb.auth.signOut(); }catch(_){}
        show('doneState');
      }catch(ex){ btn.disabled=false; btn.textContent='비밀번호 변경'; showErr((window.krErr?window.krErr(ex&&ex.message):(ex&&ex.message))||'변경에 실패했습니다.'); }
    });
  })();
  </script>
</body>
</html>

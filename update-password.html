<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>새 비밀번호 설정 | 삼괴지역 기독교 연합회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#1c69d4;--primary-active:#0653b6;--ink:#262626;--bodytext:#3c3c3c;--muted:#6b6b6b;
      --hairline:#e6e6e6;--hairline-strong:#cccccc;--canvas:#fff;--surface-soft:#f7f7f7;--dark:#1a2129;--error:#dc2626;--ok:#0f7b3f;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--surface-soft);color:var(--bodytext);font-weight:300;word-break:keep-all;
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .bar{position:sticky;top:0;background:var(--dark);height:44px;display:flex;align-items:center;}
    .bar .in{max-width:1024px;margin:0 auto;width:100%;padding:0 22px;display:flex;align-items:center;}
    .bar .in > a{font-size:13px;font-weight:700;color:rgba(255,255,255,0.92);}
    .wrap{max-width:430px;margin:0 auto;padding:56px 24px 80px;}
    .card{background:var(--canvas);border:1px solid var(--hairline);padding:44px 34px;}
    .logo{height:42px;width:auto;display:block;margin:0 auto 22px;}
    .title{margin:0;font-weight:700;font-size:26px;color:var(--ink);text-align:center;}
    .sub{margin:10px 0 26px;font-size:14px;color:var(--muted);text-align:center;line-height:1.6;}
    label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin:18px 0 6px;}
    input{width:100%;height:48px;padding:0 14px;border:1px solid var(--hairline-strong);background:#fff;font-size:16px;font-family:inherit;font-weight:300;color:var(--ink);border-radius:0;}
    input:focus{outline:none;border:2px solid var(--ink);}
    .btn{width:100%;height:48px;border:0;background:var(--primary);color:#fff;font-size:15px;font-weight:700;letter-spacing:0.5px;cursor:pointer;margin-top:24px;font-family:inherit;transition:background .15s ease;}
    .btn:hover{background:var(--primary-active);} .btn:disabled{background:var(--hairline-strong);cursor:default;}
    .err{display:none;margin-top:16px;padding:12px 14px;background:#fdecea;border:1px solid #f3c7c3;color:var(--error);font-size:14px;line-height:1.5;}
    .ok{display:none;margin-top:16px;padding:14px;background:#eafaf0;border:1px solid #bfe6cd;color:var(--ok);font-size:14px;line-height:1.6;text-align:center;}
    .foot{text-align:center;margin-top:20px;font-size:14px;color:var(--muted);} .foot a{color:var(--primary);font-weight:700;}
    #loading{padding:40px 0;text-align:center;color:var(--muted);font-size:15px;}
    #form,#expired{display:none;}
    footer{background:var(--dark);color:rgba(255,255,255,0.7);padding:24px;text-align:center;font-size:13px;}
    footer a{color:rgba(255,255,255,0.9);font-weight:700;}
  </style>
</head>
<body>
  <header class="bar"><div class="in"><a href="index.html">삼괴지역 기독교 연합회</a></div></header>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="assets/logo-trans.png" alt="삼기연" />
      <h1 class="title">새 비밀번호 설정</h1>

      <div id="loading">링크 확인 중…</div>

      <!-- 유효한 재설정 링크 -->
      <form id="form" novalidate>
        <p class="sub">새로 사용하실 비밀번호를 입력해 주세요.<br>(8자 이상, 영문+숫자 포함)</p>
        <label for="pw">새 비밀번호</label>
        <input id="pw" type="password" autocomplete="new-password" placeholder="새 비밀번호" />
        <label for="pw2">새 비밀번호 확인</label>
        <input id="pw2" type="password" autocomplete="new-password" placeholder="한 번 더 입력" />
        <div class="err" id="err"></div>
        <div class="ok" id="ok"></div>
        <button class="btn" type="submit">비밀번호 변경</button>
      </form>

      <!-- 만료/무효 링크 -->
      <div id="expired">
        <p class="sub" style="margin-top:6px;">링크가 만료되었거나 이미 사용되었습니다.<br>재설정 링크는 <b>30분간</b>만 유효하며 한 번만 사용할 수 있습니다.</p>
        <a class="btn" style="display:flex;align-items:center;justify-content:center;text-decoration:none;" href="reset-password.html">재설정 링크 다시 받기</a>
      </div>

      <div class="foot" style="margin-top:20px;"><a href="login.html">로그인으로 돌아가기</a></div>
    </div>
  </div>
  <footer>© 2026 삼괴지역 기독교 연합회 &nbsp;·&nbsp;
    <a href="terms.html#terms">이용약관</a> &nbsp;·&nbsp; <a href="terms.html#privacy">개인정보처리방침</a></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=3"></script>
  <script src="auth.js?v=9"></script>
  <script>
    var loading=document.getElementById('loading'), form=document.getElementById('form'),
        expired=document.getElementById('expired'), err=document.getElementById('err'), ok=document.getElementById('ok');
    function pwOk(p){ return p.length>=8 && /[A-Za-z]/.test(p) && /[0-9]/.test(p); }
    function showErr(m){ err.textContent=m; err.style.display='block'; ok.style.display='none'; }
    var ready=false;

    function showForm(){ if(ready) return; ready=true; loading.style.display='none'; expired.style.display='none'; form.style.display='block'; }
    function showExpired(){ if(ready) return; loading.style.display='none'; form.style.display='none'; expired.style.display='block'; }

    (async function(){
      if(!window.sb){ showExpired(); return; }
      // 복구 링크 클릭 시 supabase-js가 URL의 토큰으로 세션을 생성함
      window.sb.auth.onAuthStateChange(function(event, session){
        if(event==='PASSWORD_RECOVERY' || session){ showForm(); }
      });
      // 이미 세션이 잡혀 있으면 바로 폼 표시, 아니면 잠시 대기 후 판단
      try{
        var s=await window.sb.auth.getSession();
        if(s.data && s.data.session){ showForm(); return; }
      }catch(_){}
      setTimeout(async function(){
        try{ var s2=await window.sb.auth.getSession(); if(s2.data && s2.data.session){ showForm(); return; } }catch(_){}
        showExpired();
      }, 2500);
    })();

    form.addEventListener('submit', async function(e){
      e.preventDefault(); err.style.display='none'; ok.style.display='none';
      var pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value;
      if(!pwOk(pw)){ showErr('비밀번호는 8자 이상이며 영문과 숫자를 모두 포함해야 합니다.'); return; }
      if(pw!==pw2){ showErr('비밀번호가 일치하지 않습니다.'); return; }
      var btn=form.querySelector('.btn'); btn.disabled=true; btn.textContent='변경 중…';
      try{
        var res=await window.sb.auth.updateUser({ password: pw });
        if(res.error){ showErr(window.krErr(res.error.message)); btn.disabled=false; btn.textContent='비밀번호 변경'; return; }
        ok.innerHTML='비밀번호가 변경되었습니다.<br>새 비밀번호로 다시 로그인해 주세요.'; ok.style.display='block';
        try{ await window.sb.auth.signOut(); }catch(_){}
        setTimeout(function(){ location.href='login.html'; }, 1800);
      }catch(ex){ showErr(window.krErr(ex && ex.message)); btn.disabled=false; btn.textContent='비밀번호 변경'; }
    });
  </script>
</body>
</html>

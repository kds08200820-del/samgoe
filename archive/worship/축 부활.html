<div class="doc-head"><h1>축 부활</h1><div class="src">삼괴지역기독교연합회(삼기연) 기록물</div></div>
<div class="Section Section-0 Paper"><div class="HeaderPageFooter"><div class="Page"><p class="Normal parashape-1"><span class="lang-ko charshape-6">축 부활</span>&#13;</p><p class="Normal parashape-1"><span class="lang-ko charshape-6">* </span><span class="lang-ko charshape-9">신흥어린이집은</span><span class="lang-ko charshape-6"> 좋은나무성품학교로 차별화된 유아교</span><span class="lang-ko charshape-6">육기관입니다.</span>&#13;</p><p class="Normal parashape-1"><span class="lang-ko charshape-6">* 12가지 주제성품은</span><span class="lang-ko charshape-7"> </span><span class="lang-ko charshape-6">성경에서 가르치는 </span><span class="lang-ko charshape-8">경청, 긍정적인태도,  </span><span class="lang-ko charshape-8">  기쁨, 배려, 감사, 책임감, 인내, 순종, 절제, 창의성, 정직,  </span><span class="lang-ko charshape-8">  지혜</span><span class="lang-ko charshape-7">입니다.</span>&#13;</p><p class="Normal parashape-1"><span class="lang-ko charshape-6">* 성품은 타고나는 것이 아니라 배우는 것입니다. </span>&#13;</p><p class="Normal parashape-1"><span class="lang-ko charshape-6">* 좋은 성품의 지도자가 세상을 변화시킵니다.</span>&#13;</p><p class="Normal parashape-1"></p><p class="Normal parashape-1"></p></div></div></div>
